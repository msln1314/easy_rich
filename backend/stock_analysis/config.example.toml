# Akshare Stock Analysis 统一配置文件示例
# 默认查找顺序：当前目录 config.toml > EXE目录 config.toml > ~/.akshare_stock.toml

# ==========================================
# 数据源配置
# ==========================================
[data_sources]
# 数据源优先级（从左到右依次尝试）
# 可选值：tencent, exchange, sina, eastmoney
sources = "tencent,exchange,sina,eastmoney"

# 启用缓存（parquet/csv）
use_cache = true

# 历史数据天数（默认180天）
days = 180

# 预检失败时是否强制运行
force = false

# ==========================================
# AI 分析配置
# ==========================================
[llm]
base_url = "<API url>"  # API服务接口， 比如： "https://api-inference.modelscope.cn/v1/"
model = "<AI model>"    # 能识别图片的多模态模型，比如： Qwen-VL 系列
api_key = "<API key>"   # 你的API key
