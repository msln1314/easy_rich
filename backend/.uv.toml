[tool.uv]
# UV 配置文件

# 镜像源配置
index-url = "https://mirrors.aliyun.com/pypi/simple/"
extra-index-url = [
    "https://pypi.org/simple/",
]

# 虚拟环境配置
python-version = "3.11"
virtual-environment = ".venv"

# 依赖解析配置
prerelease = "disallow"
resolution = "highest"

# 构建配置 - 优先使用预编译包
no-binary = []
only-binary = [
    "cffi",
    "cryptography",
    "pycryptodome",
    "asyncmy",
    "greenlet",
]
